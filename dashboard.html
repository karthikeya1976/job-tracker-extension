<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Job Tracker Dashboard</title>
  <link rel="stylesheet" href="dashboard.css">
</head>
<body>
  <div class="header">
    <h1>Job Tracker</h1>
    <div class="header-right">
      <span id="gmail-status"></span>
      <button id="export-csv">Export CSV</button>
      <button id="sync-gmail">Sync Gmail</button>
      <span id="total-count">0 applications</span>
    </div>
  </div>

  <div class="stats-panel">
    <div class="stat-card">
      <span class="stat-number" id="stat-total">0</span>
      <span class="stat-label">Total</span>
    </div>
    <div class="stat-card">
      <span class="stat-number badge-interview" id="stat-interview">0</span>
      <span class="stat-label">Interviews</span>
    </div>
    <div class="stat-card">
      <span class="stat-number badge-offer" id="stat-offer">0</span>
      <span class="stat-label">Offers</span>
    </div>
    <div class="stat-card">
      <span class="stat-number badge-rejected" id="stat-rejected">0</span>
      <span class="stat-label">Rejected</span>
    </div>
    <div class="stat-card">
      <span class="stat-number" id="stat-week">0</span>
      <span class="stat-label">This Week</span>
    </div>
  </div>

  <div class="filters">
    <input type="text" id="search" placeholder="Search by company..." />
    <select id="filter-status">
      <option value="">All statuses</option>
      <option value="applied">Applied</option>
      <option value="assessment">Assessment</option>
      <option value="interview">Interview</option>
      <option value="offer">Offer</option>
      <option value="rejected">Rejected</option>
    </select>
    <select id="sort-order">
      <option value="newest">Newest first</option>
      <option value="oldest">Oldest first</option>
    </select>
  </div>

  <div id="empty-state">
    <p>No applications logged yet.</p>
    <p>Click the extension icon on a job page to get started.</p>
  </div>

  <table id="app-table">
    <thead>
      <tr>
        <th>Company</th>
        <th>Role</th>
        <th>Date Applied</th>
        <th>Status</th>
        <th>Link</th>
        <th></th>
      </tr>
    </thead>
    <tbody id="app-body"></tbody>
  </table>

  <script src="email.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
