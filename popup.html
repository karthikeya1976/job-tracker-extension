<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 320px; font-family: Arial, sans-serif; padding: 16px; }
    h2 { margin: 0 0 12px; font-size: 16px; color: #1a1a1a; }
    input { width: 100%; padding: 8px; margin-bottom: 10px;
            border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
    button { width: 100%; padding: 10px; background: #2563eb;
             color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    #status { margin-top: 10px; font-size: 13px; color: green; display: none; }
  </style>
</head>
<body>
  <h2>Log Application</h2>
  <input type="text" id="company" placeholder="Company name" />
  <input type="text" id="role" placeholder="Role / Position" />
  <button id="save">Save Application</button>
  <div id="status">Saved!</div>
  <a id="view-all" href="#" style="display:block; text-align:center; margin-top:12px; font-size:13px; color:#2563eb;">
    View all applications →
  </a>
  <script src="popup.js"></script>
</body>
</html>
