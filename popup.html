<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg:        #f8fafc;
      --surface:   #ffffff;
      --border:    rgba(0,0,0,0.08);
      --border-hi: rgba(0,0,0,0.12);
      --text-1:    #0f172a;
      --text-2:    #475569;
      --text-3:    #94a3b8;
      --input-bg:  rgba(0,0,0,0.04);
      --hover:     rgba(0,0,0,0.04);
      --accent:    #6366f1;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      background: var(--bg);
      color: var(--text-1);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
    }
    .brand-icon {
      width: 28px; height: 28px;
      background: var(--accent);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 13px; color: white;
      box-shadow: 0 2px 8px rgba(99,102,241,0.4);
      flex-shrink: 0;
    }
    .header-title { font-weight: 600; font-size: 14px; }
    #app-count { font-size: 11px; color: var(--text-3); margin-left: auto; }

    /* ── Body ── */
    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 10px; }

    /* ── Warning ── */
    #not-job-page {
      display: none;
      font-size: 11px;
      color: #fbbf24;
      background: rgba(251,191,36,0.1);
      border: 1px solid rgba(251,191,36,0.2);
      padding: 7px 10px;
      border-radius: 8px;
    }

    /* ── Inputs ── */
    input[type="text"] {
      width: 100%;
      padding: 9px 12px;
      background: var(--input-bg);
      border: 1px solid var(--border-hi);
      border-radius: 10px;
      color: var(--text-1);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    input[type="text"]::placeholder { color: var(--text-3); }
    input[type="text"]:focus {
      border-color: rgba(99,102,241,0.6);
      box-shadow: 0 0 0 2px rgba(99,102,241,0.15);
    }

    /* ── Company rating ── */
    #company-rating {
      display: none;
      font-size: 11px;
      padding: 6px 10px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-top: -4px;
    }
    .rating-grade  { font-weight: 700; margin-right: 6px; }
    .rating-detail { color: var(--text-2); margin-right: 6px; }
    .rating-label  { color: var(--text-3); }

    /* ── Opt-in checkbox ── */
    #opt-in {
      font-size: 11px;
      color: var(--text-3);
      display: flex;
      align-items: center;
      gap: 6px;
      cursor: pointer;
    }
    #opt-in input[type="checkbox"] {
      accent-color: var(--accent);
      width: 13px; height: 13px;
    }

    /* ── Action buttons ── */
    .btn-row { display: flex; gap: 8px; }
    #bookmark {
      flex: 1;
      padding: 9px;
      background: transparent;
      color: var(--text-2);
      border: 1px solid var(--border-hi);
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      transition: background 0.15s, color 0.15s;
    }
    #bookmark:hover { background: var(--hover); color: var(--text-1); }
    #applied {
      flex: 2;
      padding: 9px;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s;
      box-shadow: 0 2px 8px rgba(99,102,241,0.3);
    }
    #applied:hover { background: #5558e6; }

    /* ── Save status feedback ── */
    #status {
      display: none;
      font-size: 12px;
      padding: 8px 10px;
      border-radius: 8px;
      text-align: center;
    }
    #status.success {
      color: #16a34a;
      background: rgba(22,163,74,0.08);
      border: 1px solid rgba(22,163,74,0.2);
    }
    #status.bookmarked {
      color: var(--text-2);
      background: var(--input-bg);
      border: 1px solid var(--border);
    }

    /* ── Divider ── */
    .divider { height: 1px; background: var(--border); }

    /* ── Home button ── */
    #view-all {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      padding: 11px;
      background: none;
      border: none;
      color: var(--text-3);
      font-size: 12px;
      cursor: pointer;
      transition: color 0.15s;
    }
    #view-all:hover { color: var(--text-1); }
    #view-all svg { width: 13px; height: 13px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="brand-icon">J</div>
    <span class="header-title">Job Tracker</span>
    <span id="app-count"></span>
  </div>

  <!-- Form body -->
  <div class="body">
    <div id="not-job-page">Not on a recognised job page — you can still log manually.</div>

    <input type="text" id="company" placeholder="Company name" autocomplete="off" />
    <div id="company-rating"></div>
    <input type="text" id="role" placeholder="Role / Position" autocomplete="off" />

    <label id="opt-in">
      <input type="checkbox" id="contribute" />
      Contribute anonymously to company ratings
    </label>

    <div class="btn-row">
      <button id="bookmark">Bookmark</button>
      <button id="applied">Mark as Applied</button>
    </div>

    <div id="status"></div>
  </div>

  <div class="divider"></div>

  <!-- Home link -->
  <button id="view-all">
    <svg viewBox="0 0 20 20" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
      <path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/>
    </svg>
    Home
  </button>

  <script src="popup.js"></script>
</body>
</html>
